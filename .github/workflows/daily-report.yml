name: Daily IDS Report

on:
  schedule:
    - cron: "45 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-ids-report
  cancel-in-progress: false

jobs:
  refresh-report:
    runs-on: ubuntu-latest
    env:
      REPORT_TIMEZONE: Asia/Kolkata
      COMMIT_AUTHOR_NAME: ${{ vars.COMMIT_AUTHOR_NAME }}
      COMMIT_AUTHOR_EMAIL: ${{ vars.COMMIT_AUTHOR_EMAIL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily evaluation artifacts
        run: python scripts/generate_daily_report.py

      - name: Commit updated artifacts
        run: |
          if [ -z "${COMMIT_AUTHOR_NAME}" ] || [ -z "${COMMIT_AUTHOR_EMAIL}" ]; then
            echo "Set COMMIT_AUTHOR_NAME and COMMIT_AUTHOR_EMAIL in repository variables."
            exit 1
          fi

          git config user.name "${COMMIT_AUTHOR_NAME}"
          git config user.email "${COMMIT_AUTHOR_EMAIL}"
          export GIT_AUTHOR_NAME="${COMMIT_AUTHOR_NAME}"
          export GIT_AUTHOR_EMAIL="${COMMIT_AUTHOR_EMAIL}"
          export GIT_COMMITTER_NAME="${COMMIT_AUTHOR_NAME}"
          export GIT_COMMITTER_EMAIL="${COMMIT_AUTHOR_EMAIL}"
          git add README.md experiment_log.csv outputs/latest_metrics.json outputs/automation_heartbeat.json reports/daily
          git diff --cached --quiet && exit 0
          git commit --author="${COMMIT_AUTHOR_NAME} <${COMMIT_AUTHOR_EMAIL}>" -m "chore: refresh daily IDS evaluation report"
          git log -1 --format=fuller
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}
